name: Newman API Tests

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run tests
        run: |
          mkdir -p newman/reports
          newman run newman/collections/dummyjson.json \
            -e newman/environments/dummyjson-environment.env.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export newman/reports/report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman/reports/report.html